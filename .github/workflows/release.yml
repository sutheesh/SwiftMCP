name: Release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    name: Publish Release
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME}"

          # Extract the section between ## [VERSION] and the next ## [
          # Works with both "## [1.1.0]" and "## [1.1.0] - 2026-04-11" formats
          {
            echo "NOTES<<EOF"
            sed -n "/^## \[${VERSION}\]/,/^## \[/p" CHANGELOG.md | sed '$d'
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$(git tag --sort=-v:refname | sed -n '2p')...$VERSION"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: SwiftMCP ${{ steps.version.outputs.VERSION }}
          body: ${{ steps.notes.outputs.NOTES }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}